[jazzer]
target_class = "ValidJsonFuzzer"
args = "--cp=/out/:/out/gson-2.8.6.jar:/out/json-sanitizer.jar -jobs=1000 -workers=4 -rss_limit_mb=4096 /out/corpus -dict=/out/ValidJsonFuzzer.dict"

[swat]
java = "/jdk/build/linux-x86_64-server-release/images/jdk/bin/java"
swat = "/fuzz/SWAT"

[swat.config]
logging.classes="false"
logging.level="INFO"

instrumentation.transformer="PARAMETER"
instrumentation.parameter.symbolicPattern="ValidJsonFuzzer:fuzzerTestOneInput"
instrumentation.includePackages="ValidJsonFuzzer:com/google/json:com/google/gson"

solver.solver="CVC5"
solver.timeoutMS="10000"
