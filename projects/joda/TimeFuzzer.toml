[jazzer]
target_class = "TimeFuzzer"
args = "--cp=/out:/out/joda-time.jar -jobs=1000 -workers=4 -rss_limit_mb=4096 /out/corpus"

[swat]
java = "/jdk/bin/java"
swat = "/swat/jar/swat.jar"
args = "-Xmx32g -Djava.library.path=/swat/libs/java-library-path"

[swat.config]
logging.classes="false"
logging.level="INFO"

instrumentation.transformer="PARAMETER"
instrumentation.parameter.symbolicPattern="TimeFuzzer:fuzzerTestOneInput"
instrumentation.includePackages="TimeFuzzer:org/joda/time:org/joda"

solver.solver="Z3"
solver.timeoutMS="10000"
